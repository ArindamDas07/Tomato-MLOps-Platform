apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install psycopg2-binary;
            mlflow server --host 0.0.0.0 --port 5000 \
            --backend-store-uri postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb \
            --default-artifact-root /app/uploads/artifacts
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
          subPath: mlflow-data # Isolated Room
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  ports: [{port: 5000}]
  selector: {app: mlflow}