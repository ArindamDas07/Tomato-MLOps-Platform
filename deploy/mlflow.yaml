apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        ports:
        - containerPort: 5000
        # COMMAND: Connects to the Postgres service we just created
        command: [
          "mlflow", "server", 
          "--host", "0.0.0.0", 
          "--port", "5000", 
          "--backend-store-uri", "postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb", 
          "--default-artifact-root", "/app/uploads/mlflow-artifacts"
        ]
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: mlflow