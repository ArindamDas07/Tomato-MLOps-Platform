apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        # COMMAND: This is the "Secret Sauce" to enable persistence
        command: ["redis-server", "--appendonly", "yes"] 
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: shared-storage
          mountPath: /data
          subPath: redis-data # Keeps Redis data separate from images and Postgres
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
  - port: 6379
  selector:
    app: redis