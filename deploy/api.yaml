apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tomato-api
  template:
    metadata:
      labels:
        app: tomato-api
    spec:
      imagePullSecrets: [{name: github-auth}]
      containers:
      - name: tomato-api
        image: ghcr.io/arindamdas07/tomato-mlops-platform-api:latest
        envFrom: [{configMapRef: {name: tomato-config}}]
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
          subPath: active-sessions # Only sees the "Trash Zone"
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tomato-api-service
spec:
  ports: [{port: 80, targetPort: 8000}]
  selector: {app: tomato-api}