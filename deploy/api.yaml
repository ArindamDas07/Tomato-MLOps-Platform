apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tomato-api
  template:
    metadata:
      labels:
        app: tomato-api
    spec:
      containers:
      - name: tomato-api
        # Replace YOUR_GITHUB_USER with your actual username
        image: ghcr.io/arindamdas07/tomato-mlops-platform-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: tomato-config
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tomato-api-service
spec:
  type: LoadBalancer # This makes it accessible to the world
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: tomato-api