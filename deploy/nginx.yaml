apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { 
        worker_connections 1024; 
    }
    
    http {
        # --- 1. THE DYNAMIC RESOLVER ---
        # 10.96.0.10 is the internal Kubernetes DNS.
        # 'valid=5s' forces Nginx to refresh the Pod IP list every 5 seconds.
        resolver 10.96.0.10 valid=5s;

        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

        # --- 2. THE LOAD BALANCER ---
        # Note: In Open Source Nginx, least_conn works best when 
        # the upstream is clearly defined.
        upstream tomato_backend {
            least_conn;
            server tomato-api-service.default.svc.cluster.local:80;
        }

        server {
            listen 80;
            client_max_body_size 10M;

            location / {
                limit_req zone=api_limit burst=10 nodelay;

                # --- 3. THE "FREE" RE-RESOLUTION HACK ---
                # By using a variable, Nginx is forced to use the 
                # 'resolver' above to look up the IPs again.
                set $target http://tomato_backend;
                proxy_pass $target;
                
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                # AI models are slow, so we set long timeouts
                proxy_read_timeout 90s;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: conf
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: nginx