apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { 
        worker_connections 1024; 
    }
    
    http {
        # 1. KUBERNETES DNS RESOLVER
        resolver 10.96.0.10 valid=5s;

        # 2. RATE LIMITER SETUP (5 requests per second)
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

        # 3. LEAST CONNECT LOAD BALANCER
        upstream tomato_backend {
            least_conn;
            # --- THE CRITICAL FIX: Port must be 8000 to match FastAPI Pods ---
            server tomato-api-service.default.svc.cluster.local:8000;
        }

        server {
            listen 80;
            client_max_body_size 10M;

            location / {
                # APPLY RATE LIMITER
                limit_req zone=api_limit burst=10 nodelay;

                # 4. REVERSE PROXY WITH DYNAMIC RESOLUTION
                set $target http://tomato_backend;
                proxy_pass $target;
                
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                # Extended timeout for heavy AI inference
                proxy_read_timeout 90s;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: conf
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80        # Browser entry point (http://localhost)
    targetPort: 80   # Internal Nginx port
  selector:
    app: nginx