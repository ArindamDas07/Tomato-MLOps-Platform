# --- 1. PERMISSIONS (RBAC) ---
# This gives Prometheus permission to talk to the Kubernetes API to find Pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rbac
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
---
# --- 2. PROMETHEUS DYNAMIC CONFIG ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      # --- DYNAMIC DISCOVERY FOR SCALABLE API ---
      - job_name: 'tomato-api'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods that have the label 'app: tomato-api'
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: tomato-api
          # The API listens on 8000. This replaces the default Pod IP port with 8000.
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__

      # --- PUSHGATEWAY (Metrics from Workers) ---
      - job_name: 'pushgateway'
        honor_labels: true
        static_configs:
          - targets: ['pushgateway-service:9091']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
# --- 3. THE MONITORING DEPLOYMENT (Prometheus, Pushgateway, Grafana) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      component: monitoring
  template:
    metadata:
      labels:
        component: monitoring
    spec:
      serviceAccountName: prometheus-sa
      imagePullSecrets:
        - name: github-auth
      containers:
        # --- PROMETHEUS ---
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: shared-storage
              mountPath: /prometheus
              subPath: system-data/prometheus-db
        
        # --- PUSHGATEWAY ---
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          args: ["--persistence.file=/data/metrics.file", "--persistence.interval=5m"]
          ports:
            - containerPort: 9091
          volumeMounts:
            - name: shared-storage
              mountPath: /data
              subPath: system-data/pushgateway-files

        # --- GRAFANA ---
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-storage
              mountPath: /var/lib/grafana
              subPath: system-data/grafana-db

      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: shared-storage
          persistentVolumeClaim:
            claimName: tomato-pvc
---
# --- 4. SERVICES ---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
spec:
  ports:
    - port: 9091
      targetPort: 9091
  selector:
    component: monitoring
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-ui
spec:
  type: LoadBalancer
  ports:
    - name: prometheus
      port: 9090
      targetPort: 9090
    - name: grafana
      port: 3000
      targetPort: 3000
    - name: pushgateway
      port: 9091
      targetPort: 9091
  selector:
    component: monitoring