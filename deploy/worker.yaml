apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-worker
spec:
  selector:
    matchLabels:
      app: tomato-worker
  template:
    metadata:
      labels:
        app: tomato-worker
    spec:
      imagePullSecrets: [{name: github-auth}]
      containers:
      - name: tomato-worker
        image: ghcr.io/arindamdas07/tomato-mlops-platform-worker:latest
        resources:
          limits: {memory: "3Gi", cpu: "1000m"}
        envFrom: [{configMapRef: {name: tomato-config}}]
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
          subPath: active-sessions # Only sees the "Trash Zone"
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc