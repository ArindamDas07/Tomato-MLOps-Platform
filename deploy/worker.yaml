apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-worker
spec:
  selector:
    matchLabels:
      app: tomato-worker
  template:
    metadata:
      labels:
        app: tomato-worker
    spec:
      imagePullSecrets: [{name: github-auth}]
      containers:
      - name: tomato-worker
        image: ghcr.io/arindamdas07/tomato-mlops-platform-worker:latest
        
        # --- THE SPEED TWEAK ---
        # Tells K8s to use the local 'docker pull' image if it exists
        imagePullPolicy: IfNotPresent 
        
        resources:
          # --- THE STARTUP TWEAK ---
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
            
        envFrom: [{configMapRef: {name: tomato-config}}]
        volumeMounts:
        - name: shared-storage
          mountPath: /app/uploads
          subPath: active-sessions
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc