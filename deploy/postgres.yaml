apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "mlflowdb"
        - name: POSTGRES_USER
          value: "mlflowuser"
        - name: POSTGRES_PASSWORD
          value: "mlflowpass"
        volumeMounts:
        - name: shared-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres-data # Keeps it separate from leaf images
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: tomato-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
  - port: 5432
  selector:
    app: postgres