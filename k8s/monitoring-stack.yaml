# --- 1. PERMISSIONS (RBAC) ---
# Required for Dynamic Pod Discovery
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rbac
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
---
# --- 2. PVC FOR MONITORING ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitoring-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 1Gi }
---
# --- 3. MONITORING DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels: { component: monitoring }
  template:
    metadata:
      labels: { component: monitoring }
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
              subPath: prometheus-db
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          args: ["--persistence.file=/data/metrics.file"]
          ports: [{ containerPort: 9091 }]
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: pushgateway-files
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
              subPath: grafana-db
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: monitoring-pvc }
---
# --- 4. SERVICE (THE FIX) ---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service # Renamed to match worker expectation
spec:
  type: LoadBalancer
  ports:
    - { name: prometheus, port: 9090, targetPort: 9090 }
    - { name: grafana, port: 3000, targetPort: 3000 }
    - { name: pushgateway, port: 9091, targetPort: 9091 }
  selector: { component: monitoring }