# --- PVC for Monitoring Data ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitoring-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 1Gi }
---
# --- MONITORING DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels: { component: monitoring }
  template:
    metadata:
      labels: { component: monitoring }
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
              subPath: prometheus-db
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          args: ["--persistence.file=/data/metrics.file"]
          ports: [{ containerPort: 9091 }]
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: pushgateway-files
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
              subPath: grafana-db
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: monitoring-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-ui
spec:
  type: LoadBalancer
  ports:
    - { name: prometheus, port: 9090 }
    - { name: grafana, port: 3000 }
    - { name: pushgateway, port: 9091 }
  selector: { component: monitoring }