# --- 1. PERMISSIONS (RBAC) ---
# This gives Prometheus the 'Passport' to look at other Pods in the cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rbac
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
---
# --- 2. PROMETHEUS CONFIG ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      # DYNAMIC DISCOVERY: Find every replica of the API automatically
      - job_name: 'tomato-api'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: tomato-api
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__

      # PUSHGATEWAY: For the Workers (A/B testing and Drift data)
      - job_name: 'pushgateway'
        honor_labels: true  # CRITICAL: Keeps the labels sent by the Worker
        static_configs:
          - targets: ['localhost:9091']

      # REDIS: Track task queue health
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter-service:9121']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
# --- 3. MONITORING DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      component: monitoring
  template:
    metadata:
      labels:
        component: monitoring
    spec:
      serviceAccountName: prometheus-sa
      imagePullSecrets: [{name: github-auth}]
      containers:
        # PROMETHEUS: The Metrics Database
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d" # Don't fill up the disk
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "200m", memory: "512Mi" }
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: shared-storage
              mountPath: /prometheus
              subPath: system-data/prometheus-db
        
        # PUSHGATEWAY: The 'Inbox' for Worker metrics
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          args: 
            - "--persistence.file=/data/metrics.file"
            - "--persistence.interval=5m" # Save to PVC every 5 minutes
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
          ports:
            - containerPort: 9091
          volumeMounts:
            - name: shared-storage
              mountPath: /data
              subPath: system-data/pushgateway-files

        # GRAFANA: The Dashboard UI
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true" # Portfolio Tip: Let people see your charts!
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-storage
              mountPath: /var/lib/grafana
              subPath: system-data/grafana-db

      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: shared-storage
          persistentVolumeClaim:
            claimName: tomato-pvc
---
# --- 4. SERVICES ---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
spec:
  ports:
    - port: 9091
      targetPort: 9091
  selector:
    component: monitoring
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-ui
spec:
  # LoadBalancer works on Docker Desktop to expose your dashboards
  type: LoadBalancer
  ports:
    - name: prometheus
      port: 9090
      targetPort: 9090
    - name: grafana
      port: 3000
      targetPort: 3000
  selector:
    component: monitoring