# --- 1. STORAGE ISOLATION ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 512Mi }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 1Gi }
---
# --- 2. REDIS (Hardened with InitContainer) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      initContainers:
      - name: volume-mount-hack
        image: busybox
        command: ["sh", "-c", "chown -R 999:999 /data"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
      containers:
      - name: redis
        image: redis:7-alpine
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        command: ["redis-server", "--appendonly", "yes"]
        ports: [{ containerPort: 6379 }]
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim: { claimName: redis-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports: [{ port: 6379 }]
  selector: { app: redis }
---
# --- 3. REDIS EXPORTER (THE MISSING LINK) ---
# This translates Redis metrics for Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis-exporter }
  template:
    metadata:
      labels: { app: redis-exporter }
    spec:
      containers:
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.55.0
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        ports: [{ containerPort: 9121 }]
        resources:
          requests: { cpu: "20m", memory: "32Mi" }
          limits: { cpu: "50m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-service # Points to the Prometheus Scraper
spec:
  ports: [{ port: 9121, targetPort: 9121 }]
  selector: { app: redis-exporter }
---
# --- 4. POSTGRES (Hardened with InitContainer) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      initContainers:
      - name: volume-mount-hack
        image: busybox
        command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: postgres:15
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        env:
        - name: POSTGRES_DB
          value: "mlflowdb"
        - name: POSTGRES_USER
          value: "mlflowuser"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: tomato-secrets, key: POSTGRES_PASSWORD }
        ports: [{ containerPort: 5432 }]
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pg-data
        persistentVolumeClaim: { claimName: postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports: [{ port: 5432 }]
  selector: { app: postgres }