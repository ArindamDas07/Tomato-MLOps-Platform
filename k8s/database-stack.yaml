# --- 1. STORAGE ISOLATION (PVCs) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 512Mi }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 1Gi }
---
# --- 2. REDIS HEADLESS SERVICE (Required for StatefulSet) ---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  clusterIP: None # Headless
  ports: [{ port: 6379 }]
  selector: { app: redis }
---
# --- 3. REDIS STATEFULSET (Anti-SPOF Configuration) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: "redis"
  replicas: 1 # Scalable to 3+ for HA in Cloud
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      # Ensure Redis doesn't share a node with another Redis pod
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["redis"]
              topologyKey: "kubernetes.io/hostname"

      initContainers:
      - name: volume-mount-hack
        image: busybox:latest
        command: ["sh", "-c", "chown -R 999:999 /data"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
      
      containers:
      - name: redis
        image: redis:7-alpine
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        command: ["redis-server", "--appendonly", "yes"]
        ports: [{ containerPort: 6379 }]
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits: { cpu: "100m", memory: "128Mi" }
        livenessProbe:
          tcpSocket: { port: 6379 }
          initialDelaySeconds: 10
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim: { claimName: redis-pvc }
---
# --- 4. REDIS EXPORTER (Observability Sidecar) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis-exporter }
  template:
    metadata:
      labels: { app: redis-exporter }
    spec:
      containers:
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.55.0
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        ports: [{ containerPort: 9121 }]
        resources:
          requests: { cpu: "20m", memory: "32Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-service
spec:
  ports: [{ port: 9121, targetPort: 9121 }]
  selector: { app: redis-exporter }
---
# --- 5. POSTGRES HEADLESS SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None # Headless for StatefulSet stable network IDs
  ports: [{ port: 5432 }]
  selector: { app: postgres }
---
# --- 6. POSTGRES STATEFULSET (Hardened & Ready for MLflow) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["postgres"]
              topologyKey: "kubernetes.io/hostname"

      initContainers:
      - name: volume-mount-hack
        image: busybox:latest
        command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      
      containers:
      - name: postgres
        image: postgres:15-alpine
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        env:
        - name: POSTGRES_DB
          value: "mlflowdb"
        - name: POSTGRES_USER
          value: "mlflowuser"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: tomato-secrets, key: POSTGRES_PASSWORD }
        ports: [{ containerPort: 5432 }]
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "mlflowuser", "-d", "mlflowdb"]
          initialDelaySeconds: 15
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pg-data
        persistentVolumeClaim: { claimName: postgres-pvc }