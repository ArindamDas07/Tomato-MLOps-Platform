# --- 1. STORAGE ISOLATION ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 512Mi }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 1Gi }
---
# --- 2. REDIS ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        # Senior Security: Enforce non-root inside Redis
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        command: ["redis-server", "--appendonly", "yes"]
        ports: [{ containerPort: 6379 }]
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim: { claimName: redis-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports: [{ port: 6379 }]
  selector: { app: redis }
---
# --- 3. POSTGRES ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
      - name: postgres
        image: postgres:15
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        env:
        - name: POSTGRES_DB
          value: "mlflowdb"
        - name: POSTGRES_USER
          value: "mlflowuser"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: tomato-secrets, key: POSTGRES_PASSWORD }
        ports: [{ containerPort: 5432 }]
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pg-data
        persistentVolumeClaim: { claimName: postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports: [{ port: 5432 }]
  selector: { app: postgres }