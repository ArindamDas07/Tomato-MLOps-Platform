apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-api
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: tomato-api
  template:
    metadata:
      labels:
        app: tomato-api
    spec:
      imagePullSecrets: [{name: github-auth}]
      
      # ---  Pod Anti-Affinity ---
      # This ensures API replicas are distributed across the cluster.
      # We use 'preferred' so it still works on your single-node Docker Desktop.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["tomato-api"]
              topologyKey: "kubernetes.io/hostname"

      securityContext:
        runAsNonRoot: true
        fsGroup: 1000

      containers:
      - name: tomato-api
        image: ghcr.io/arindamdas07/tomato-mlops-platform-api:latest
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true 
          runAsUser: 1000

        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }

        readinessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 10
        livenessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 15

        envFrom:
        - configMapRef: { name: tomato-config }
        - secretRef: { name: tomato-secrets }
            
        volumeMounts:
        - name: shared-uploads
          mountPath: /app/uploads
        - name: tmp-volume
          mountPath: /tmp
      
      volumes:
      - name: shared-uploads
        persistentVolumeClaim: { claimName: tomato-upload-pvc }
      - name: tmp-volume
        emptyDir: {}