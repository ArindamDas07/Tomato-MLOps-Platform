apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-api
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: tomato-api
  template:
    metadata:
      labels:
        app: tomato-api
    spec:
      imagePullSecrets: [{name: github-auth}]
      
      # ---HA: Pod Anti-Affinity ---
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["tomato-api"]
              topologyKey: "kubernetes.io/hostname"

      # --- Dependency Management ---
      # This ensures the API only starts once Redis is accepting connections.
      # This prevents restarts and ensures the 'lifespan' startup logic succeeds.
      initContainers:
      - name: wait-for-redis
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done;']

      securityContext:
        runAsNonRoot: true
        fsGroup: 1000

      containers:
      - name: tomato-api
        image: ghcr.io/arindamdas07/tomato-mlops-platform-api:latest
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true 
          runAsUser: 1000

        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }

        # ---  Tuned Probes ---
        # Increased delays to account for Python interpreter and library initialization
        readinessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 20 
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 30
          periodSeconds: 15

        envFrom:
        - configMapRef: { name: tomato-config }
        - secretRef: { name: tomato-secrets }
            
        volumeMounts:
        - name: shared-uploads
          mountPath: /app/uploads
        # Required for ReadOnlyRootFilesystem to allow temporary FastAPI/Python files
        - name: tmp-volume
          mountPath: /tmp
      
      volumes:
      - name: shared-uploads
        persistentVolumeClaim: { claimName: tomato-upload-pvc }
      - name: tmp-volume
        emptyDir: {}