apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-api
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: tomato-api
  template:
    metadata:
      labels:
        app: tomato-api
    spec:
      # Use the secret for pulling images from GHCR
      imagePullSecrets: [{name: github-auth}]
      containers:
      - name: tomato-api
        image: ghcr.io/arindamdas07/tomato-mlops-platform-api:latest
        
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10

        envFrom:
        - configMapRef:
            name: tomato-config
        - secretRef:
            name: tomato-secrets
            
        volumeMounts:
        - name: shared-uploads
          mountPath: /app/uploads
          # We mount the root of our new dedicated PVC
      
      volumes:
      - name: shared-uploads
        persistentVolumeClaim:
          # SENIOR FIX: Points to the dedicated storage bridge
          claimName: tomato-upload-pvc