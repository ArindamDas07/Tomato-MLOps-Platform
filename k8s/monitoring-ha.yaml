# --- 1. PERMISSIONS (RBAC) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rbac
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
---
# --- 2. STORAGE (The Persistence Layer) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pushgateway-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 512Mi }
---
# --- 3. PROMETHEUS (StatefulSet) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
spec:
  serviceName: "prometheus"
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus-sa
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 65534:65534 /prometheus"]
        volumeMounts:
        - name: data
          mountPath: /prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle" # Allows reloading config without restart
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  type: LoadBalancer 
  ports:
    - port: 9090
      targetPort: 9090
      name: web
  selector: { app: prometheus }
---
# --- 4. PUSHGATEWAY (Now with Persistence) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: pushgateway }
  template:
    metadata:
      labels: { app: pushgateway }
    spec:
      #  Ensure Pushgateway can write its persistence file
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 65534:65534 /data"]
        volumeMounts:
        - name: push-data
          mountPath: /data
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          args: 
            - "--persistence.file=/data/metrics.file"
            - "--persistence.interval=5m" # Saves RAM to Disk every 5 mins
          ports: [{ containerPort: 9091 }]
          volumeMounts:
          - name: push-data
            mountPath: /data
      volumes:
      - name: push-data
        persistentVolumeClaim: { claimName: pushgateway-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
spec:
  type: LoadBalancer
  ports: [{ port: 9091, targetPort: 9091 }]
  selector: { app: pushgateway }
---
# --- 5. GRAFANA (Persistent) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          securityContext:
            runAsUser: 472
            runAsGroup: 472
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: grafana-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: LoadBalancer
  ports: [{ port: 3000, targetPort: 3000 }]
  selector: { app: grafana }