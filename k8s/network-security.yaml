# --- 1. API FIREWALL ---
# Only allow Nginx to talk to the API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-api
spec:
  podSelector:
    matchLabels:
      app: tomato-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx
---
# --- 2. REDIS FIREWALL ---
# Only allow API and Worker to talk to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-redis
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: tomato-api
    - podSelector:
        matchLabels:
          app: tomato-worker
---
# --- 3. DATABASE FIREWALL ---
# Only allow Worker and MLflow to talk to Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-to-db
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: tomato-worker
    - podSelector:
        matchLabels:
          app: mlflow
---
# --- 4. MONITORING FIREWALL ---
# Allow Prometheus to scrape metrics from everyone
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
spec:
  podSelector: {} # Protects all pods
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          component: monitoring