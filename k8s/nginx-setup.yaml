apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    #  Must specify a writable PID file for non-root users
    pid /tmp/nginx.pid;

    events { 
        worker_connections 1024; 
    }

    http {
        #  Redirect all temporary paths to /tmp
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp_path;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        resolver 10.96.0.10 valid=5s;
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        upstream tomato_backend {
            least_conn; 
            server tomato-api-service.default.svc.cluster.local:8000;
        }

        server {
            listen 8080;
            client_max_body_size 10M;

            location / {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://tomato_backend; 
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_connect_timeout 10s;
                proxy_read_timeout 90s;
            }

            location /healthz {
                access_log off;
                return 200 'OK';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 101

      initContainers:
      - name: wait-for-api-dns
        image: busybox:latest
        securityContext:
          runAsUser: 1000
        command: ['sh', '-c', 'until nslookup tomato-api-service.default.svc.cluster.local; do echo waiting for dns; sleep 2; done;']

      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # Hardened 'Iron Cage'
          runAsUser: 101
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        #  Mount /tmp as a writable volume for PID and buffers
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: conf
        configMap:
          name: nginx-config
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80        
    targetPort: 8080
  selector:
    app: nginx