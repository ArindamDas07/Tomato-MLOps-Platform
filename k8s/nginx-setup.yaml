apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { 
        worker_connections 1024; 
    }
    
    http {
        # K8s internal DNS resolver
        resolver 10.96.0.10 valid=5s;

        # Rate Limiting: 10 requests per second per user IP
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        upstream tomato_backend {
            # Senior Move: This group name MUST be used directly in proxy_pass
            least_conn;
            server tomato-api-service.default.svc.cluster.local:8000;
        }

        server {
            listen 80;
            client_max_body_size 10M;

            location / {
                # Protection against DDoS/Spam
                limit_req zone=api_limit burst=20 nodelay;

                # --- THE SENIOR FIX ---
                # We removed the '$target' variable. 
                # Pointing directly to the upstream group ensures Nginx uses
                # the Least-Connection logic across your scaled Pods.
                proxy_pass http://tomato_backend; 
                
                # Standard proxy headers
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                # Resilience settings for Auto-scaling
                proxy_next_upstream error timeout http_502 http_503 http_504;
                proxy_connect_timeout 5s;
                proxy_read_timeout 90s;
            }

            # Health check for Nginx itself
            location /healthz {
                return 200 'OK';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        ports:
        - containerPort: 80
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: conf
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80        
    targetPort: 80
  selector:
    app: nginx