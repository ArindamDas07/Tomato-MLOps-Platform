apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { 
        worker_connections 1024; 
    }
    http {
        resolver 10.96.0.10 valid=5s;
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        upstream tomato_backend {
            least_conn; 
            server tomato-api-service.default.svc.cluster.local:8000;
        }

        server {
            listen 80;
            client_max_body_size 10M;

            location / {
                limit_req zone=api_limit burst=20 nodelay;

                #  Lazy DNS Resolution ---
                set $target tomato-api-service.default.svc.cluster.local;
                proxy_pass http://$target:8000; 
                
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                proxy_next_upstream error timeout http_502 http_503 http_504;
                proxy_connect_timeout 5s;
                proxy_read_timeout 90s;
            }

            location /healthz {
                access_log off;
                return 200 'OK';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports:
        - containerPort: 80
        
        # --- Cold Start Resilience ---
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 60 # Increased from 20
          periodSeconds: 15
          timeoutSeconds: 10     # Increased from 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 60 # Increased from 20
          periodSeconds: 10
          timeoutSeconds: 10     # Increased from 5
          failureThreshold: 3

        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: conf
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80        
    targetPort: 80
  selector:
    app: nginx