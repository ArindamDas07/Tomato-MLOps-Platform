apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { 
        worker_connections 1024; 
    }
    http {
        resolver 10.96.0.10 valid=5s;
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        upstream tomato_backend {
            least_conn; 
            server tomato-api-service.default.svc.cluster.local:8000;
        }

        server {
            #  Port 8080 is required for non-root Nginx
            listen 8080;
            client_max_body_size 10M;

            location / {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://tomato_backend; 
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_connect_timeout 10s;
                proxy_read_timeout 90s;
            }

            location /healthz {
                access_log off;
                return 200 'OK';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # ---  Pod Level ---
      securityContext:
        runAsNonRoot: true

      initContainers:
      - name: wait-for-api-dns
        image: busybox:latest
        #  Explicitly set user to 1000
        securityContext:
          runAsUser: 1000
        command: ['sh', '-c', 'until nslookup tomato-api-service.default.svc.cluster.local; do echo waiting for dns; sleep 2; done;']

      containers:
      - name: nginx
        # Use the unprivileged image to allow runAsNonRoot: true
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 101 # Default UID for nginx-unprivileged
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        ports:
        - containerPort: 8080
        livenessProbe:
          # Updated to 8080
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          # Updated to 8080
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: conf
        configMap: { name: nginx-config }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
spec:
  type: LoadBalancer 
  ports:
  - port: 80        
    targetPort: 8080 # Points to the unprivileged port 8080
  selector:
    app: nginx