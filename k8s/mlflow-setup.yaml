# --- PVC for MLflow Artifacts (Models/Plots) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifact-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 2Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels: { app: mlflow }
  template:
    metadata:
      labels: { app: mlflow }
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        ports: [{ containerPort: 5000 }]
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "1Gi" }
        env:
        - name: DB_PASS
          valueFrom:
            secretKeyRef: { name: tomato-secrets, key: POSTGRES_PASSWORD }
        readinessProbe:
          tcpSocket: { port: 5000 }
          initialDelaySeconds: 15
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install psycopg2-binary;
            mlflow server \
              --host 0.0.0.0 \
              --port 5000 \
              --backend-store-uri postgresql://mlflowuser:${DB_PASS}@postgres:5432/mlflowdb \
              --default-artifact-root /mlflow-artifacts \
              --serve-artifacts
        volumeMounts:
        - name: artifacts
          mountPath: /mlflow-artifacts
      volumes:
      - name: artifacts
        persistentVolumeClaim: { claimName: mlflow-artifact-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  type: LoadBalancer
  ports: [{ port: 5000 }]
  selector: { app: mlflow }