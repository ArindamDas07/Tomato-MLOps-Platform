apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: tomato-worker-scaler
spec:
  scaleTargetRef:
    name: tomato-worker
  
  # Professional Setup: 
  # min: 2 (for zero-downtime during updates)
  # max: 5 (to prevent crashing your laptop RAM)
  minReplicaCount: 2
  maxReplicaCount: 5
  
  pollingInterval: 5  
  cooldownPeriod: 60 

  triggers:
  - type: redis
    metadata:
      host: redis.default.svc.cluster.local
      port: "6379"
      listName: "celery" # Default Celery queue name
      listLength: "1"    # If even 1 image is waiting, KEDA scales up immediately
      databaseIndex: "0" # Matches your REDIS_DB_TASKS in config