apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-worker
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: tomato-worker
  template:
    metadata:
      labels:
        app: tomato-worker
    spec:
      imagePullSecrets: [{name: github-auth}]
      containers:
      - name: tomato-worker
        image: ghcr.io/arindamdas07/tomato-mlops-platform-worker:latest
        imagePullPolicy: IfNotPresent 
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
            
        envFrom:
        - configMapRef:
            name: tomato-config
        - secretRef:
            name: tomato-secrets

        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - celery
          initialDelaySeconds: 30 
          periodSeconds: 20

        volumeMounts:
        - name: shared-uploads
          mountPath: /app/uploads
          # Same mount path as API to ensure code imports work
      
      volumes:
      - name: shared-uploads
        persistentVolumeClaim:
          # SENIOR FIX: Must match the API exactly to share the same disk
          claimName: tomato-upload-pvc