apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomato-worker
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: tomato-worker
  template:
    metadata:
      labels:
        app: tomato-worker
    spec:
      imagePullSecrets: [{name: github-auth}]
      
      # --- HA: Soft Anti-Affinity ---
      # Encourages K8s to spread workers across nodes if available,
      # but allows them to run on a single node (Docker Desktop).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["tomato-worker"]
              topologyKey: "kubernetes.io/hostname"

      securityContext:
        runAsNonRoot: true
        fsGroup: 1000

      containers:
      - name: tomato-worker
        image: ghcr.io/arindamdas07/tomato-mlops-platform-worker:latest
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 1000

        resources:
          requests: { memory: "1.5Gi", cpu: "500m" }
          limits: { memory: "3Gi", cpu: "1000m" }
            
        envFrom:
        - configMapRef: { name: tomato-config }
        - secretRef: { name: tomato-secrets }

        # --- THE HEALTH CHECK (Targeted & Robust) ---
        livenessProbe:
          exec:
            # -d celery@$HOSTNAME ensures we only ping THIS specific pod.
            # This prevents cluster-wide broadcast timeouts.
            command: ["bash", "-c", "celery -A worker.celery_app inspect ping -d celery@$HOSTNAME"]
          initialDelaySeconds: 90 # Increased: Give AI models ample time to load
          periodSeconds: 60
          timeoutSeconds: 15

        readinessProbe:
          exec:
            # We use 'ping' for readiness too. If the worker can respond to a ping,
            # it is connected to Redis and ready to pull tasks from the queue.
            command: ["bash", "-c", "celery -A worker.celery_app inspect ping -d celery@$HOSTNAME"]
          initialDelaySeconds: 45 # Increased: Wait for Celery mingle/handshake
          periodSeconds: 30
          timeoutSeconds: 10

        volumeMounts:
        - name: shared-uploads
          mountPath: /app/uploads
        - name: tmp-volume
          mountPath: /tmp
      
      volumes:
      - name: shared-uploads
        persistentVolumeClaim: { claimName: tomato-upload-pvc }
      - name: tmp-volume
        emptyDir: {}