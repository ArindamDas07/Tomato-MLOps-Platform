apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tomato-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tomato-api
  minReplicas: 2
  maxReplicas: 10 # Scale up to 10 pods during heavy traffic
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70