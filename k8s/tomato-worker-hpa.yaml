apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tomato-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tomato-worker
  minReplicas: 1
  maxReplicas: 5 # Scaling workers is expensive (RAM), so we cap it at 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80 # Workers are CPU-bound; scale up at 80%