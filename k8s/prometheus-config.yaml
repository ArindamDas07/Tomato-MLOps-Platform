apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      scrape_timeout: 9s # RE-ADDED: Critical to prevent scrape hangs

    scrape_configs:
      # 1. DYNAMIC API DISCOVERY
      # Scrapes all pods labeled 'app: tomato-api'
      - job_name: 'tomato-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["default"] # RE-ADDED: Security best practice
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: tomato-api
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__

      # 2. PUSHGATEWAY (For Worker Metrics)
      # Changed from 'localhost' to 'pushgateway-service' because they are now in separate pods
      - job_name: 'pushgateway'
        honor_labels: true  
        static_configs:
          - targets: ['pushgateway-service:9091']

      # 3. REDIS MONITORING
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter-service:9121']

      # 4. PROMETHEUS SELF-MONITORING
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090'] # Localhost works here because Prometheus is scraping itself