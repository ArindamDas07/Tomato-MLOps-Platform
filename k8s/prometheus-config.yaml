apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      scrape_timeout: 9s

    scrape_configs:
      # DYNAMIC API DISCOVERY (For Auto-scaling)
      - job_name: 'tomato-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["default"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: tomato-api
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__

      # PUSHGATEWAY (For Worker Metrics)
      - job_name: 'pushgateway'
        honor_labels: true  
        static_configs:
          - targets: ['localhost:9091']

      # REDIS MONITORING
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter-service:9121']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']