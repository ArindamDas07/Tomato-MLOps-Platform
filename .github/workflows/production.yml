name: Production Quality Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # --- STAGE 1: THE QUALITY GATE ---
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # THE EMERGENCY FIX: STOP BANDWIDTH BLEED
          lfs: false 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements-test.txt'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Lint Check (Ruff)
        run: ruff check .

      - name: Run Automated Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest -v tests/

  # --- STAGE 2: PROTECTED BUILD & PUSH ---
  build-and-push:
    needs: test-and-lint 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # THE EMERGENCY FIX: STOP BANDWIDTH BLEED
          lfs: false 

      - name: Lowercase Registry Address
        run: |
          echo "IMAGE_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-api:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-worker:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max