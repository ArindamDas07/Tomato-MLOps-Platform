name: Production Quality Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # --- STAGE 1: THE QUALITY GATE ---
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install All Dependencies
        # Senior Move: We install the specialized test requirements
        run: pip install -r requirements-test.txt

      - name: Lint Check (Ruff)
        # Fails the build if code doesn't meet professional standards
        run: ruff check .

      - name: Run Automated Tests
        # Fails the build if your math or API logic is broken
        # We set PYTHONPATH=. so tests can find 'shared', 'api', and 'worker'
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

  # --- STAGE 2: PROTECTED BUILD & PUSH ---
  build-and-push:
    needs: test-and-lint # CRITICAL: This build ONLY starts if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true 

      - name: Lowercase Registry Address
        run: |
          echo "IMAGE_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile.api
          push: true
          # We use the SHA of the commit as a version tag - Industry Standard
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-api:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-worker:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/tomato-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max