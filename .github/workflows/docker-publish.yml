name: Build and Push Production Images

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # This ensures your ResNet model is actually downloaded

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile.api
          push: true
          # We use lowercase conversion for the repository owner
          tags: |
            ghcr.io/${{ github.repository_owner }}/tomato-mlops-platform-api:latest
          labels: |
             org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tomato-mlops-platform-worker:latest
          labels: |
             org.opencontainers.image.source=https://github.com/${{ github.repository }}