global:
  scrape_interval: 10s
  scrape_timeout: 9s 

scrape_configs:
  # --- 1. DYNAMIC API DISCOVERY ---
  - job_name: 'tomato-api'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - default 
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: tomato-api
      - source_labels: [__address__]
        action: replace
        regex: ([^:]+)(?::\d+)?
        replacement: $1:8000
        target_label: __address__

  # --- 2. PUSHGATEWAY ---
  - job_name: 'pushgateway'
    honor_labels: true # CRITICAL for A/B testing labels
    static_configs:
      - targets: ['localhost:9091']

  # --- 3. REDIS MONITORING ---
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter-service:9121']

  # --- 4. PROMETHEUS SELF-HEALTH ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']