global:
  scrape_interval: 10s

scrape_configs:
  # --- 1. DYNAMIC API DISCOVERY (The Master Feature) ---
  # This uses Kubernetes Service Discovery to find every individual Pod.
  # This allows you to see metrics for EACH replica if you scale up.
  - job_name: 'tomato-api'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape pods that have the label 'app: tomato-api'
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: tomato-api
      # CRITICAL FIX: The API Pods listen on 8000. 
      # This replaces the default port with 8000 so the scraper works.
      - source_labels: [__address__]
        action: replace
        regex: ([^:]+)(?::\d+)?
        replacement: $1:8000
        target_label: __address__

  # --- 2. PUSHGATEWAY (For Worker Metrics) ---
  - job_name: 'pushgateway'
    honor_labels: true  
    static_configs:
      - targets: ['pushgateway-service:9091']

  # --- 3. REDIS MONITORING (Via Redis Exporter) ---
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter-service:9121']

  # --- 4. PROMETHEUS SELF-HEALTH ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']